<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Research Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Sora',sans-serif;
  min-height:100vh;
  background:#0d0d0d;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  text-align:center;
}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:#BA0C2F;
  margin:0 auto 32px;
  box-shadow:0 0 0 6px rgba(186,12,47,.18);
}
h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;line-height:1.15;margin-bottom:14px}
p{color:rgba(255,255,255,.55);font-size:1rem;line-height:1.7;margin-bottom:36px;max-width:44ch;margin-left:auto;margin-right:auto}
.btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn{
  border:none;cursor:pointer;font-family:'Sora',sans-serif;
  font-size:.95rem;font-weight:700;
  padding:14px 32px;border-radius:99px;
  transition:transform .15s,opacity .15s;
}
.btn:hover{transform:translateY(-2px);opacity:.9}
.yes{background:#BA0C2F;color:#fff}
.no{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15)}
.no:hover{background:rgba(255,255,255,.18)}
.hint{margin-top:20px;font-size:.78rem;color:rgba(255,255,255,.25);letter-spacing:.04em}
</style>
</head>
<body>
<div class="dot"></div>
<h1>Research Workshop<br>— which version is for you?</h1>
<p>This program has two tracks. Please choose the one that applies to you.</p>
<div class="btns">
<button class="btn yes" onclick="window.location.href='./lighthouse/'">I'm a Lighthouse Schools student</button>
<button class="btn no" onclick="window.location.href='./normal/'">I'm not a Lighthouse student</button>
</div>
<div class="hint">Ohio State University · Summer 2026</div>
</body>
</html>
