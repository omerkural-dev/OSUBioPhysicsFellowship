<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Internship Program</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Arial,sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#111;
      color:#fff;
      padding:24px;
      text-align:center;
    }
    .card{
      max-width:640px;
      width:100%;
      background:#1b1b1b;
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:40px 28px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    h1{
      font-size:2rem;
      line-height:1.2;
      margin-bottom:14px;
    }
    p{
      color:rgba(255,255,255,.7);
      font-size:1rem;
      line-height:1.7;
      margin-bottom:28px;
    }
    .buttons{
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
    }
    button{
      border:none;
      border-radius:999px;
      padding:14px 24px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s,opacity .15s;
    }
    button:hover{
      transform:translateY(-1px);
      opacity:.95;
    }
    .yes{
      background:#BA0C2F;
      color:#fff;
    }
    .no{
      background:#fff;
      color:#111;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Are you a Lighthouse Schools student?</h1>
    <p>Please choose the version of the website that applies to you.</p>
    <div class="buttons">
      <button class="yes" onclick="window.location.href='./lighthouse/'">Yes</button>
      <button class="no" onclick="window.location.href='./normal/'">No</button>
    </div>
  </div>
</body>
</html>
